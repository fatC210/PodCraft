services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - backend_storage:/app/storage
      - backend_db:/app/podcraft.db
      - backend_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"   # 可选：本地直接访问后端调试用

  frontend:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=backend:8000
    depends_on:
      - backend

volumes:
  backend_storage:
  backend_db:
  backend_data:
